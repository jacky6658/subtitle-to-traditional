<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIJob 工具箱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #eef3fb;
    --surface: #ffffff;
    --border: #d0ddf5;
    --accent: #2563eb;
    --accent2: #1d4ed8;
    --accent-glow: rgba(37, 99, 235, 0.15);
    --text: #0f172a;
    --text-sub: #64748b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 24px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 56px;
  }

  .logo {
    width: 80px; height: 80px;
    border-radius: 22px;
    display: inline-block;
    margin-bottom: 18px;
    box-shadow: 0 8px 32px var(--accent-glow);
    overflow: hidden;
  }
  .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  header p {
    margin-top: 8px;
    font-size: 15px;
    color: var(--text-sub);
  }

  /* ── 更新區塊 ── */
  .update-bar {
    margin-top: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  #version-label {
    font-size: 12px;
    color: #94a3b8;
  }

  #update-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--text-sub);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s, color 0.2s;
  }
  #update-btn:hover { border-color: var(--accent); color: var(--accent); }
  #update-btn:disabled { opacity: 0.5; cursor: default; }

  #update-status {
    font-size: 12px;
    color: var(--text-sub);
    display: none;
  }
  #update-status.ok { color: #059669; }
  #update-status.new { color: var(--accent); }
  #update-status.err { color: #dc2626; }

  #do-update-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 12px;
    color: #fff;
    cursor: pointer;
    display: none;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  #do-update-btn:hover { background: var(--accent2); }

  /* ── 工具卡片 ── */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 860px;
  }

  .tool-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }
  .tool-card:hover {
    border-color: var(--accent);
    box-shadow: 0 8px 32px var(--accent-glow);
    transform: translateY(-2px);
  }

  .tool-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  .tool-card h2 { font-size: 17px; font-weight: 700; }
  .tool-card p { font-size: 13px; color: var(--text-sub); line-height: 1.6; }

  .tool-arrow {
    margin-top: auto;
    padding-top: 12px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  footer {
    margin-top: auto;
    padding-top: 56px;
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="/static/logo.png" alt="AIJob">
  </div>
  <h1>AIJob 工具箱</h1>
  <p>專為影音工作者打造的智能工具</p>

  <div class="update-bar">
    <span id="version-label">版本載入中...</span>
    <button id="update-btn" onclick="checkUpdate()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0114.13-3.36L23 10M1 14l5.36 5.36A9 9 0 0020.49 15"/>
      </svg>
      檢查更新
    </button>
    <span id="update-status"></span>
    <button id="do-update-btn" onclick="doUpdate()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.88 18.09A5 5 0 0018 9h-1.26A8 8 0 103 16.29"/>
      </svg>
      立即更新
    </button>
  </div>
</header>

<div class="tools-grid">
  <a class="tool-card" href="/tool">
    <div class="tool-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
        <path d="M7 10h2l1 2 2-5 1 3h2"/>
      </svg>
    </div>
    <h2>字幕轉繁體工具</h2>
    <p>自動辨識影片語音，將字幕轉換為繁體中文並嵌入影片</p>
    <div class="tool-arrow">
      開啟工具
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </div>
  </a>
</div>

<footer>
  © 2025 AIJob．保留所有權利<br>
  未經授權，嚴禁轉售、二次販售或轉讓本工具
</footer>

<script>
const statusEl = document.getElementById('update-status');
const doBtn = document.getElementById('do-update-btn');
const updateBtn = document.getElementById('update-btn');
const verLabel = document.getElementById('version-label');

async function loadVersion() {
  try {
    const r = await fetch('/api/check-update');
    const d = await r.json();
    if (d.error) { verLabel.textContent = '版本：未知'; return; }
    verLabel.textContent = `版本 ${d.local === '0.0.0' ? d.remote : d.local}`;
  } catch { verLabel.textContent = '版本：未知'; }
}

async function checkUpdate() {
  updateBtn.disabled = true;
  statusEl.className = '';
  statusEl.style.display = 'inline';
  statusEl.textContent = '檢查中...';
  doBtn.style.display = 'none';
  try {
    const r = await fetch('/api/check-update');
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    if (d.has_update) {
      statusEl.className = 'new';
      statusEl.textContent = `發現新版本 ${d.remote}！`;
      doBtn.style.display = 'inline-flex';
    } else {
      statusEl.className = 'ok';
      statusEl.textContent = '已是最新版本';
    }
  } catch (e) {
    statusEl.className = 'err';
    statusEl.textContent = '檢查失敗，請確認網路連線';
  }
  updateBtn.disabled = false;
}

async function doUpdate() {
  doBtn.disabled = true;
  updateBtn.disabled = true;
  statusEl.className = '';
  statusEl.textContent = '更新中，請稍候...';
  try {
    const r = await fetch('/api/do-update', { method: 'POST' });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    statusEl.className = 'ok';
    verLabel.textContent = `版本 ${d.version}`;
    if (d.needs_restart) {
      statusEl.textContent = `更新完成！伺服器重啟中，請稍後重新整理...`;
      setTimeout(() => location.reload(), 4000);
    } else {
      statusEl.textContent = `更新完成！已升級至 ${d.version}`;
      doBtn.style.display = 'none';
    }
  } catch (e) {
    statusEl.className = 'err';
    statusEl.textContent = '更新失敗：' + e.message;
    doBtn.disabled = false;
    updateBtn.disabled = false;
  }
}

loadVersion();
</script>
</body>
</html>
