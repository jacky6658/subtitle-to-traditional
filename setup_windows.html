<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字幕轉繁體 — Windows 安裝精靈</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #eef3fb;
    --surface: #fff;
    --border: #d0ddf5;
    --accent: #2563eb;
    --text: #0f172a;
    --sub: #64748b;
    --success: #059669;
    --error: #dc2626;
    --warn: #d97706;
  }
  body {
    background: var(--bg);
    font-family: -apple-system, "Microsoft JhengHei", "PingFang TC", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 4px 40px rgba(37,99,235,0.08);
  }
  .logo {
    width: 72px; height: 72px;
    border-radius: 18px;
    display: block;
    margin: 0 auto 20px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.15);
  }
  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    text-align: center;
    color: var(--sub);
    font-size: 14px;
    margin-bottom: 36px;
  }
  .os-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    margin: 0 auto 24px;
    display: flex;
    justify-content: center;
    width: fit-content;
    margin: -20px auto 24px;
  }

  /* Steps */
  .steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .step {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: #f8faff;
    transition: all 0.3s;
  }
  .step.active { border-color: var(--accent); background: rgba(37,99,235,0.04); }
  .step.done   { border-color: var(--success); background: rgba(5,150,105,0.04); }
  .step.error  { border-color: var(--error);   background: rgba(220,38,38,0.04); }
  .step-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .step.active .step-icon { border-color: var(--accent); background: rgba(37,99,235,0.1); animation: pulse 1.5s infinite; }
  .step.done .step-icon   { border-color: var(--success); background: rgba(5,150,105,0.1); }
  .step-text { flex: 1; }
  .step-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .step-desc  { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .step-status { font-size: 12px; font-weight: 600; color: var(--sub); }
  .step.active .step-status { color: var(--accent); }
  .step.done .step-status   { color: var(--success); }

  /* Progress bar */
  .progress-wrap {
    background: #e8f0fe;
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #3b82f6);
    border-radius: 8px;
    width: 0%;
    transition: width 0.6s ease;
  }
  .progress-label { text-align: center; font-size: 13px; color: var(--sub); min-height: 20px; }

  #start-btn {
    width: 100%;
    margin-top: 24px;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(37,99,235,0.3);
    transition: all 0.2s;
  }
  #start-btn:hover { transform: translateY(-1px); }
  #start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .note {
    display: none;
    margin-top: 16px;
    background: rgba(217,119,6,0.08);
    border: 1px solid rgba(217,119,6,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--warn);
    line-height: 1.5;
  }

  .done-msg {
    display: none;
    text-align: center;
    margin-top: 20px;
    padding: 16px;
    background: rgba(5,150,105,0.08);
    border: 1px solid rgba(5,150,105,0.3);
    border-radius: 12px;
    color: var(--success);
    font-size: 15px;
    font-weight: 600;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.4); }
    50%      { box-shadow: 0 0 0 6px rgba(37,99,235,0); }
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <img class="logo" src="logo.png" alt="AIJob Tools">
  <h1>字幕<span>轉繁體</span> 安裝精靈</h1>
  <p class="subtitle">首次使用需安裝必要工具，完成後每次開啟都只需幾秒</p>
  <div class="os-badge">🪟 Windows 版本</div>

  <div class="steps">
    <div class="step" id="s-python">
      <div class="step-icon">🐍</div>
      <div class="step-text">
        <div class="step-title">Python 3.12</div>
        <div class="step-desc">程式執行環境（via winget）</div>
      </div>
      <div class="step-status" id="st-python">等待中</div>
    </div>
    <div class="step" id="s-ffmpeg">
      <div class="step-icon">🎬</div>
      <div class="step-text">
        <div class="step-title">ffmpeg</div>
        <div class="step-desc">影片處理引擎（via winget）</div>
      </div>
      <div class="step-status" id="st-ffmpeg">等待中</div>
    </div>
    <div class="step" id="s-packages">
      <div class="step-icon">📦</div>
      <div class="step-text">
        <div class="step-title">Python 套件</div>
        <div class="step-desc">AI 處理相關套件</div>
      </div>
      <div class="step-status" id="st-packages">等待中</div>
    </div>
    <div class="step" id="s-whisper">
      <div class="step-icon">🎙️</div>
      <div class="step-text">
        <div class="step-title">語音辨識模型</div>
        <div class="step-desc">Whisper 模型（約 1.5GB）</div>
      </div>
      <div class="step-status" id="st-whisper">等待中</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
  <div class="progress-label" id="progress-label">點擊下方按鈕開始安裝</div>

  <div class="note" id="pw-note">
    ⚠️ 安裝過程中如出現 <strong>UAC 權限視窗</strong>，請點擊「是」允許繼續安裝
  </div>

  <button id="start-btn" onclick="startInstall()">開始安裝</button>

  <div class="done-msg" id="done-msg">
    ✅ 安裝完成！正在開啟工具，請稍候...
  </div>
</div>

<script>
const stepMap    = { python:'s-python', ffmpeg:'s-ffmpeg', packages:'s-packages', whisper:'s-whisper', done:null };
const statusMap  = { python:'st-python', ffmpeg:'st-ffmpeg', packages:'st-packages', whisper:'st-whisper' };
const stepOrder  = ['python', 'ffmpeg', 'packages', 'whisper'];

let polling = false, started = false;

function setStep(step, state, statusText) {
  const id = stepMap[step]; if (!id) return;
  document.getElementById(id).className = 'step ' + state;
  const st = document.getElementById(statusMap[step]);
  if (st && statusText) st.textContent = statusText;
}
function markDone(step) {
  const el = document.getElementById(stepMap[step]); if (!el) return;
  el.className = 'step done';
  document.getElementById(statusMap[step]).textContent = '✓ 完成';
}

async function startInstall() {
  if (started) return;
  started = true;
  document.getElementById('start-btn').disabled = true;
  document.getElementById('start-btn').innerHTML = '<span class="spinner"></span>安裝中...';
  document.getElementById('pw-note').style.display = 'block';
  await fetch('/api/start');
  polling = true;
  poll();
}

async function poll() {
  if (!polling) return;
  try {
    const data = await fetch('/api/status').then(r => r.json());
    document.getElementById('progress-bar').style.width  = data.progress + '%';
    document.getElementById('progress-label').textContent = data.message;

    const curIdx = stepOrder.indexOf(data.step);
    stepOrder.forEach((s, i) => {
      if (i < curIdx) markDone(s);
      else if (i === curIdx) setStep(s, 'active', '進行中...');
    });

    if (data.error) {
      polling = false;
      document.getElementById('progress-label').style.color = '#dc2626';
      document.getElementById('progress-label').textContent = '❌ ' + data.error;
      document.getElementById('start-btn').disabled = false;
      document.getElementById('start-btn').innerHTML = '重新嘗試';
      started = false;
      return;
    }
    if (data.done) {
      polling = false;
      stepOrder.forEach(s => markDone(s));
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('done-msg').style.display = 'block';
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('pw-note').style.display = 'none';
      setTimeout(waitAndRedirect, 2000);
      return;
    }
  } catch(e) {}
  setTimeout(poll, 1500);
}

async function waitAndRedirect() {
  try {
    const r = await fetch('http://127.0.0.1:8765/');
    if (r.ok) { window.location.href = 'http://127.0.0.1:8765'; return; }
  } catch(e) {}
  setTimeout(waitAndRedirect, 1500);
}
</script>
</body>
</html>
