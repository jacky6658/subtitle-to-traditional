<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字幕轉繁體工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #eef3fb;
    --surface: #ffffff;
    --surface2: #f0f5ff;
    --border: #d0ddf5;
    --accent: #2563eb;
    --accent2: #1d4ed8;
    --accent-glow: rgba(37, 99, 235, 0.18);
    --text: #0f172a;
    --text-sub: #64748b;
    --success: #059669;
    --error: #dc2626;
    --warn: #d97706;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 48px;
  }
  .logo {
    width: 72px; height: 72px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px var(--accent-glow);
    overflow: hidden;
  }
  .logo img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  h1 span { color: var(--accent2); }
  .subtitle {
    margin-top: 8px;
    color: var(--text-sub);
    font-size: 15px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 640px;
  }

  /* ── Drop Zone ── */
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  #dropzone:hover, #dropzone.dragover {
    border-color: var(--accent);
    background: rgba(124, 106, 255, 0.06);
  }
  #dropzone.dragover { transform: scale(1.01); }
  #dropzone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon {
    font-size: 48px; margin-bottom: 12px; display: block;
    filter: grayscale(0.3);
  }
  .drop-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .drop-sub { color: var(--text-sub); font-size: 13px; }
  .drop-tag {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 12px;
  }

  /* ── File Selected ── */
  #file-info {
    display: none;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 16px;
  }
  .file-icon { font-size: 28px; }
  .file-meta { flex: 1; overflow: hidden; }
  .file-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .file-remove {
    background: none; border: none; color: var(--text-sub);
    cursor: pointer; font-size: 18px; padding: 4px;
    transition: color 0.15s;
  }
  .file-remove:hover { color: var(--error); }

  /* ── Button ── */
  #start-btn {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px var(--accent-glow);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  #start-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px var(--accent-glow);
  }
  #start-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
    transform: none;
  }

  /* ── Progress ── */
  #progress-section {
    display: none;
    margin-top: 24px;
  }
  .steps {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    position: relative;
  }
  .steps::before {
    content: '';
    position: absolute;
    top: 16px; left: 16px; right: 16px;
    height: 2px;
    background: var(--border);
    z-index: 0;
  }
  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    z-index: 1;
  }
  .step-dot {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.3s;
  }
  .step.active .step-dot {
    border-color: var(--accent);
    background: var(--accent-glow);
    animation: pulse 1.5s infinite;
  }
  .step.done .step-dot {
    border-color: var(--success);
    background: rgba(52,211,153,0.15);
    color: var(--success);
  }
  .step-label { font-size: 11px; color: var(--text-sub); text-align: center; }
  .step.active .step-label, .step.done .step-label { color: var(--text); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(124,106,255,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(124,106,255,0); }
  }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #3b82f6);
    border-radius: 8px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 13px;
    color: var(--text-sub);
    text-align: center;
  }

  /* ── Result ── */
  #result-section {
    display: none;
    margin-top: 24px;
  }
  .result-header {
    display: flex; align-items: center; gap: 8px;
    font-size: 15px; font-weight: 600;
    color: var(--success);
    margin-bottom: 16px;
  }
  video#preview {
    width: 100%; border-radius: 10px;
    background: #000;
    border: 1px solid var(--border);
  }
  #download-btn {
    width: 100%;
    margin-top: 14px;
    padding: 13px;
    background: rgba(52,211,153,0.12);
    border: 1.5px solid var(--success);
    border-radius: 12px;
    color: var(--success);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  #download-btn:hover { background: rgba(52,211,153,0.2); }

  /* ── Error ── */
  #error-section {
    display: none;
    margin-top: 20px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--error);
  }

  /* ── Footer ── */
  footer {
    margin-top: 40px;
    color: var(--text-sub);
    font-size: 12px;
    text-align: center;
  }

  /* ── Spinner ── */
  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div class="card">

  <!-- Drop Zone -->
  <div id="dropzone">
    <input type="file" id="file-input" accept="video/*">
    <span class="drop-icon">🎥</span>
    <div class="drop-title">拖曳影片到這裡，或點擊選擇</div>
    <div class="drop-sub">自動辨識字幕位置・繁體轉換・無損輸出</div>

  <!-- File Info -->
  <div id="file-info">
    <span class="file-icon">🎞️</span>
    <div class="file-meta">
      <div class="file-name" id="file-name-text"></div>
      <div class="file-size" id="file-size-text"></div>
    </div>
    <button class="file-remove" id="remove-btn" title="移除">✕</button>

        <div class="step-dot">🔄</div>
        <div class="step-label">繁體轉換</div>

      </div>

        <div class="step-dot">✅</div>
        <div class="step-label">完成</div>
      </div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label">準備中...</div>
  </div>

      ⬇️ 下載繁體字幕影片
    </button>

  <!-- Error -->
  <div id="error-section" id="error-msg"></div>

</div>

<footer>
  本工具在您的電腦上執行，影片不會上傳至任何伺服器
  <span style="margin-left:12px; color:#94a3b8;">·</span>
  <button onclick="localStorage.removeItem('aijob_tour_v1'); tourStart();" style="margin-left:12px; background:none; border:none; color:#94a3b8; font-size:12px; cursor:pointer; text-decoration:underline; padding:0;">重看新手導覽</button>
</footer>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');
const fileInfo = document.getElementById('file-info');
const fileNameText = document.getElementById('file-name-text');
const fileSizeText = document.getElementById('file-size-text');
const removeBtn = document.getElementById('remove-btn');
const startBtn = document.getElementById('start-btn');
const progressSection = document.getElementById('progress-section');
const progressBar = document.getElementById('progress-bar');
const progressLabel = document.getElementById('progress-label');
const resultSection = document.getElementById('result-section');
const errorSection = document.getElementById('error-section');
const preview = document.getElementById('preview');
const downloadBtn = document.getElementById('download-btn');

let selectedFile = null;
let outputBlob = null;

function formatSize(bytes) {
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function setFile(file) {
  selectedFile = file;
  fileNameText.textContent = file.name;
  fileSizeText.textContent = formatSize(file.size);
  fileInfo.style.display = 'flex';
  startBtn.disabled = false;
  resultSection.style.display = 'none';
  errorSection.style.display = 'none';
  progressSection.style.display = 'none';
}

function clearFile() {
  selectedFile = null;
  fileInput.value = '';
  fileInfo.style.display = 'none';
  startBtn.disabled = true;
  resultSection.style.display = 'none';
  progressSection.style.display = 'none';
  errorSection.style.display = 'none';
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
removeBtn.addEventListener('click', clearFile);

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) setFile(f);
});

function setStep(stepId) {
  ['step-whisper','step-convert','step-video','step-done'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    const order = ['step-whisper','step-convert','step-video','step-done'];
    const cur = order.indexOf(stepId);
    if (i < cur) el.classList.add('done');
    else if (i === cur) el.classList.add('active');
  });
}

function setProgress(pct, label) {
  progressBar.style.width = pct + '%';
  progressLabel.textContent = label;
}

startBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  startBtn.disabled = true;
  startBtn.innerHTML = '<div class="spinner"></div><span>處理中...</span>';
  progressSection.style.display = 'block';
  resultSection.style.display = 'none';
  errorSection.style.display = 'none';

  setStep('step-whisper');
  setProgress(5, '上傳影片中...');

  const formData = new FormData();
  formData.append('video', selectedFile);

  try {
    // Upload & start processing
    const uploadRes = await fetch('http://localhost:8765/process', {
      method: 'POST',
      body: formData
    });
    if (!uploadRes.ok) throw new Error('伺服器錯誤：' + uploadRes.status);
    const { job_id } = await uploadRes.json();

    // Poll for progress
    setProgress(10, 'Whisper 辨識字幕中...');
    setStep('step-whisper');

    await pollProgress(job_id);

  } catch (err) {
    showError(err.message || '處理失敗，請確認本地伺服器是否已啟動');
    startBtn.disabled = false;
    startBtn.innerHTML = '<span>開始轉換</span>';
  }
});

async function pollProgress(jobId) {
  while (true) {
    await new Promise(r => setTimeout(r, 1500));
    const res = await fetch(`http://localhost:8765/status/${jobId}`);
    const data = await res.json();

    const { status, progress, stage, error } = data;

    if (status === 'error') { throw new Error(error || '處理失敗'); }

    setProgress(Math.round(progress * 100), stage || '處理中...');

    if (progress < 0.35) setStep('step-whisper');
    else if (progress < 0.45) setStep('step-convert');
    else if (progress < 0.98) setStep('step-video');

    if (status === 'done') {
      setStep('step-done');
      setProgress(100, '完成！');
      await showResult(jobId);
      return;
    }
  }
}

async function showResult(jobId) {
  const res = await fetch(`http://localhost:8765/download/${jobId}`);
  outputBlob = await res.blob();
  const url = URL.createObjectURL(outputBlob);
  preview.src = url;
  resultSection.style.display = 'block';
  progressSection.style.display = 'none';

  const origName = selectedFile.name.replace(/\.[^.]+$/, '');
  downloadBtn.onclick = () => {
    const a = document.createElement('a');
    a.href = url;
    a.download = origName + '_繁體字幕.mp4';
    a.click();
  };

  startBtn.disabled = false;
  startBtn.innerHTML = '<span>再轉一支</span>';
}

let _lastErrorMsg = '';

function showError(msg) {
  _lastErrorMsg = msg;
  errorSection.style.display = 'block';
  errorSection.innerHTML = '⚠️ ' + msg +
    ' <button onclick="reportError()" style="margin-left:10px;background:#ef4444;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;">回報錯誤</button>';
  progressSection.style.display = 'none';
  startBtn.innerHTML = '<span>重新開始</span>';
}

async function reportError() {
  const info = [
    '錯誤訊息：' + _lastErrorMsg,
    'OS：' + navigator.platform,
    'UA：' + navigator.userAgent,
    '時間：' + new Date().toLocaleString('zh-TW'),
  ].join('\n');
  try {
    await fetch('https://api.telegram.org/bot8284901200:AAE0o9f6EVx6WRPGuhXM1IGli1YVhD3--wc/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: '8365775688', text: '🛑 字幕轉繁體工具錯誤回報\n\n' + info }),
    });
    alert('已送出錯誤回報，謝謝！');
  } catch (e) {
    alert('回報失敗，請截圖後聯繫客服。');
  }
}
</script>

<!-- ── 教學導覽 ── -->
<style>
#tour-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9000;
  pointer-events: none;
}
#tour-overlay.active { display: block; pointer-events: all; }
#tour-backdrop {

}
#tour-spotlight {

}
#tour-box {

}
#tour-box::before {

}
#tour-box.arrow-top::before    { top:-6px; left:50%; margin-left:-6px; }
#tour-box.arrow-bottom::before { bottom:-6px; left:50%; margin-left:-6px; }
#tour-box.arrow-left::before   { left:-6px; top:50%; margin-top:-6px; }
#tour-box.arrow-right::before  { right:-6px; top:50%; margin-top:-6px; }
#tour-step-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  color: #2563eb; text-transform: uppercase; margin-bottom: 6px;
}
#tour-title { font-size: 16px; font-weight: 700; color: #0f172a; margin-bottom: 6px; }
#tour-desc  { font-size: 13px; color: #64748b; line-height: 1.55; margin-bottom: 18px; }
.tour-btns  { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
#tour-skip  {
  background: none; border: none; color: #94a3b8;
  font-size: 13px; cursor: pointer; padding: 6px 4px;
}

#tour-next  {
  background: #2563eb; color: #fff;
  border: none; border-radius: 8px;
  padding: 8px 18px; font-size: 13px; font-weight: 600;

}

#tour-dots  { display: flex; gap: 5px; align-items: center; flex: 1; }

  width: 6px; height: 6px; border-radius: 50%;
  background: #e2e8f0; transition: background 0.2s;
}
.tour-dot.active { background: #2563eb; width: 18px; border-radius: 3px; }
</style>

<div id="tour-overlay">
  <div id="tour-backdrop"></div>
  <div id="tour-spotlight"></div>
  <div id="tour-box">
    <div id="tour-step-label"></div>
    <div id="tour-title"></div>
    <div id="tour-desc"></div>
    <div class="tour-btns">
      <div id="tour-dots"></div>
      <button id="tour-skip" onclick="tourEnd()">跳過</button>
      <button id="tour-next" onclick="tourNext()">下一步</button>
    </div>
  </div>
</div>

<script>
const TOUR_KEY = 'aijob_tour_v1';
const tourSteps = [
  {
    title: '👋 歡迎使用字幕轉繁體工具',
    desc: '只需三個步驟，60 秒內完成簡體→繁體字幕轉換。我來帶你快速了解如何使用。',
    target: null
  },
  {
    title: '① 拖曳或點擊上傳影片',
    desc: '將影片直接拖曳到這個區域，或點擊選擇檔案。支援 MP4、MOV、MKV、AVI。',
    target: '#dropzone',
    arrow: 'bottom'
  },
  {
    title: '② 點擊開始轉換',
    desc: '上傳影片後，點擊此按鈕。工具會自動辨識字幕位置、去除舊字幕、加上繁體新字幕。',
    target: '#start-btn',
    arrow: 'bottom'
  },
  {
    title: '③ 預覽並下載',
    desc: '轉換完成後可在頁面直接預覽影片，確認無誤後點擊下載即可。\n\n首次轉換約需 3-5 分鐘，請耐心等候。',
    target: null,
    isLast: true
  }
];

let tourIdx = 0;

function tourStart() {
  if (localStorage.getItem(TOUR_KEY)) return;
  tourIdx = 0;
  document.getElementById('tour-overlay').classList.add('active');
  tourShow();
}

function tourShow() {
  const step = tourSteps[tourIdx];
  const overlay = document.getElementById('tour-overlay');
  const box = document.getElementById('tour-box');
  const spotlight = document.getElementById('tour-spotlight');

  document.getElementById('tour-step-label').textContent = `步驟 ${tourIdx + 1} / ${tourSteps.length}`;
  document.getElementById('tour-title').textContent = step.title;
  document.getElementById('tour-desc').textContent = step.desc;
  document.getElementById('tour-next').textContent = step.isLast ? '開始使用 🎉' : '下一步';
  document.getElementById('tour-skip').style.display = step.isLast ? 'none' : '';

  // Dots
  const dots = document.getElementById('tour-dots');
  dots.innerHTML = tourSteps.map((_, i) =>
    `<div class="tour-dot ${i === tourIdx ? 'active' : ''}"></div>`
  ).join('');

  if (step.target) {
    const el = document.querySelector(step.target);
    const r = el.getBoundingClientRect();
    const pad = 10;
    spotlight.style.cssText = `
      left:${r.left - pad}px; top:${r.top - pad + window.scrollY}px;
      width:${r.width + pad*2}px; height:${r.height + pad*2}px;
      opacity:1;
    `;
    document.getElementById('tour-backdrop').style.background = 'transparent';

    // Position box
    box.className = 'arrow-' + (step.arrow === 'top' ? 'bottom' : 'top');
    const bw = 300, gap = 16;
    let bx = r.left + r.width/2 - bw/2;
    bx = Math.max(12, Math.min(bx, window.innerWidth - bw - 12));
    let by;
    if (step.arrow === 'bottom') {
      by = r.top + window.scrollY - 10 - 160 - gap;
      box.style.cssText = `left:${bx}px; top:${by}px;`;
      box.querySelector('::before') && null;
    } else {
      by = r.bottom + window.scrollY + pad + gap;
      box.style.cssText = `left:${bx}px; top:${by}px;`;
    }
  } else {
    spotlight.style.cssText = 'opacity:0; left:50%; top:50%; width:0; height:0;';
    document.getElementById('tour-backdrop').style.background = 'rgba(15,23,42,0.7)';
    box.className = '';
    box.style.cssText = `
      left:50%; top:50%;
      transform: translate(-50%,-50%);
    `;
  }
}

function tourNext() {
  tourIdx++;
  if (tourIdx >= tourSteps.length) { tourEnd(); return; }
  tourShow();
}

function tourEnd() {
  localStorage.setItem(TOUR_KEY, '1');
  document.getElementById('tour-overlay').classList.remove('active');
}

// Start tour after short delay
setTimeout(tourStart, 800);
</script>
