<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字幕轉繁體 — 下載</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #eef3fb;
    --surface: #fff;
    --border: #d0ddf5;
    --accent: #2563eb;
    --text: #0f172a;
    --sub: #64748b;
  }
  body {
    background: var(--bg);
    font-family: -apple-system, "Microsoft JhengHei", "PingFang TC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }

  .logo-wrap { text-align: center; margin-bottom: 28px; }
  .logo {
    width: 88px; height: 88px;
    border-radius: 22px;
    box-shadow: 0 8px 32px rgba(37,99,235,0.18);
    display: block;
    margin: 0 auto 16px;
  }
  h1 { font-size: 28px; font-weight: 800; color: var(--text); }
  h1 span { color: var(--accent); }
  .tagline { font-size: 15px; color: var(--sub); margin-top: 6px; }

  /* Feature pills */
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin: 20px 0 36px;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .pill svg { flex-shrink: 0; }

  /* OS cards */
  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 680px;
    width: 100%;
  }
  .os-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px 28px;
    flex: 1;
    min-width: 260px;
    max-width: 300px;
    text-align: center;
    transition: all 0.25s;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    box-shadow: 0 2px 20px rgba(37,99,235,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .os-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(37,99,235,0.14);
  }
  .os-icon {
    width: 56px; height: 56px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }
  .os-name { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .os-req  { font-size: 12px; color: var(--sub); margin-bottom: 24px; flex: 1; }
  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    color: white;
    border-radius: 10px;
    padding: 11px 24px;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(37,99,235,0.25);
    transition: all 0.2s;
    width: 100%;
    justify-content: center;
  }
  .os-card:hover .dl-btn { box-shadow: 0 6px 20px rgba(37,99,235,0.4); }

  /* Steps */
  .how {
    margin-top: 48px;
    max-width: 640px;
    width: 100%;
  }
  .how h2 {
    font-size: 13px;
    font-weight: 700;
    color: var(--sub);
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .steps-row {
    display: flex;
    position: relative;
  }
  .steps-row::before {
    content: '';
    position: absolute;
    top: 23px;
    left: calc(12.5% + 12px);
    right: calc(12.5% + 12px);
    height: 2px;
    background: var(--border);
    z-index: 0;
  }
  .step-item { flex: 1; text-align: center; position: relative; z-index: 1; }
  .step-num {
    width: 48px; height: 48px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    color: var(--accent);
  }
  .step-label { font-size: 12px; color: var(--sub); font-weight: 500; line-height: 1.4; }

  .footer { margin-top: 40px; font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>

<div class="logo-wrap">
  <img class="logo" src="logo.png" alt="AIJob Tools">
  <h1>字幕<span>轉繁體</span></h1>
  <p class="tagline">AI 自動將影片簡體字幕轉換為繁體中文 — 一鍵完成</p>
</div>

  <span class="pill">

    Whisper AI 語音辨識
  </span>
  <span class="pill">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9"/></svg>

  </span>
  <span class="pill">

    字幕燒錄處理
  </span>
  <span class="pill">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
    一鍵安裝，無需技術背景
  </span>
</div>

<div class="cards">
  <a class="os-card" href="字幕轉繁體.app.zip" download>
    <div class="os-icon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M33.2 10.4C31.5 12.4 28.8 13.9 26.2 13.7c-.3-2.6 1-5.3 2.6-7 1.7-1.9 4.5-3.3 6.9-3.4.2 2.7-.8 5.3-2.5 7.1z" fill="#1d1d1f"/>
        <path d="M36.1 17.2c-3.8-.2-7 2.2-8.8 2.2-1.8 0-4.5-2.1-7.5-2-3.8.1-7.3 2.2-9.3 5.6-4 6.8-1 16.8 2.8 22.3 1.9 2.7 4.1 5.8 7 5.7 2.8-.1 3.9-1.8 7.3-1.8 3.4 0 4.4 1.8 7.4 1.7 3-.1 4.9-2.8 6.8-5.5 2.1-3.1 3-6.1 3-6.3-.1-.1-5.8-2.2-5.8-8.7 0-5.5 4.5-8.1 4.7-8.2-2.6-3.8-6.6-4.9-7.6-5z" fill="#1d1d1f"/>
      </svg>
    </div>
    <div class="os-name">macOS 版本</div>
    <div class="os-req">macOS 12 Monterey 以上</div>
    <span class="dl-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
      下載 .app
    </span>
  </a>

  <a class="os-card" href="字幕轉繁體（Windows）.zip" download>
    <div class="os-icon">
      <svg width="46" height="46" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 8.5L22 6v16H4V8.5z" fill="#0078d4"/>
        <path d="M24 5.7l20-2.7v18.5H24V5.7z" fill="#0078d4"/>
        <path d="M4 24h18v15.5L4 37V24z" fill="#0078d4"/>
        <path d="M24 24h20v16l-20-2.8V24z" fill="#0078d4"/>

    <div class="os-name">Windows 版本</div>
    <div class="os-req">Windows 10 / 11（需要 winget）</div>
    <span class="dl-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
      下載 .zip
    </span>
  </a>
</div>

<div class="how">
  <h2>使用步驟</h2>
  <div class="steps-row">
    <div class="step-item">
      <div class="step-num">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>

      <div class="step-label">下載並解壓<br>檔案</div>

    <div class="step-item">

      </div>
      <div class="step-label">拖曳影片<br>上傳</div>
    </div>
    <div class="step-item">
      <div class="step-num">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
      </div>
      <div class="step-label">下載完成<br>繁體字幕影片</div>
    </div>
  </div>
</div>

<p class="footer">© 2025 AIJob Tools — 由 AI 驅動的影片工具</p>

<script>
const isMac = navigator.platform.toUpperCase().includes('MAC') || navigator.userAgent.includes('Mac');
const cards = document.querySelectorAll('.os-card');
if (isMac) cards[0].style.borderColor = '#2563eb';
else        cards[1].style.borderColor = '#2563eb';
</script>
</body>
</html>
